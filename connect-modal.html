<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Connect — Social Links Modal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }

  body {
    font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(0, 245, 255, 0.12), transparent 60%),
      radial-gradient(ellipse 80% 60% at 80% 90%, rgba(79, 110, 247, 0.15), transparent 60%),
      #0a0a14;
    min-height: 100vh;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    -webkit-font-smoothing: antialiased;
  }

  /* ============ DEMO PAGE CONTENT ============ */
  .demo-content {
    text-align: center;
    max-width: 520px;
  }
  .demo-content h1 {
    font-size: clamp(1.6rem, 4vw, 2.2rem);
    font-weight: 700;
    margin-bottom: 14px;
    background: linear-gradient(135deg, #00f5ff, #4f6ef7);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.02em;
  }
  .demo-content p {
    color: rgba(255, 255, 255, 0.55);
    font-size: 0.95rem;
    line-height: 1.6;
  }

  /* ============ FLOATING TRIGGER ============ */
  .connect-trigger {
    position: fixed;
    bottom: 28px;
    right: 28px;
    background: linear-gradient(135deg, #00f5ff 0%, #4f6ef7 100%);
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: 14px 26px;
    font-family: inherit;
    font-size: 0.95rem;
    font-weight: 700;
    letter-spacing: 0.02em;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    box-shadow:
      0 10px 30px rgba(0, 245, 255, 0.4),
      0 0 0 1px rgba(255, 255, 255, 0.1) inset;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1),
                box-shadow 0.3s ease;
    z-index: 100;
  }
  .connect-trigger:hover {
    transform: translateY(-3px) scale(1.05);
    box-shadow:
      0 15px 40px rgba(0, 245, 255, 0.55),
      0 0 0 1px rgba(255, 255, 255, 0.2) inset;
  }
  .connect-trigger:active { transform: translateY(0) scale(1); }
  .connect-trigger:focus-visible {
    outline: 2px solid #00f5ff;
    outline-offset: 4px;
  }
  .connect-trigger svg {
    width: 18px; height: 18px;
    flex-shrink: 0;
  }

  /* ============ MODAL OVERLAY ============ */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 1000;
  }
  .modal-overlay.active {
    opacity: 1;
    pointer-events: auto;
  }

  /* ============ MODAL CARD ============ */
  .modal-card {
    background: rgba(20, 20, 30, 0.95);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 16px;
    box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
    padding: 36px 32px 32px;
    width: 100%;
    max-width: 420px;
    transform: scale(0.8);
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
  }
  .modal-overlay.active .modal-card {
    transform: scale(1);
  }

  /* ============ CLOSE BUTTON ============ */
  .modal-close {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 34px;
    height: 34px;
    background: transparent;
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 50%;
    color: rgba(255, 255, 255, 0.7);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .modal-close:hover {
    color: #00f5ff;
    border-color: #00f5ff;
    box-shadow: 0 0 16px rgba(0, 245, 255, 0.5);
  }
  .modal-close:focus-visible {
    outline: 2px solid #00f5ff;
    outline-offset: 2px;
  }
  .modal-close svg {
    width: 16px; height: 16px;
  }

  /* ============ MODAL TITLE ============ */
  .modal-title {
    font-size: 1.6rem;
    font-weight: 700;
    color: #fff;
    margin-bottom: 28px;
    letter-spacing: -0.02em;
  }

  /* ============ SECTIONS ============ */
  .section { margin-bottom: 26px; }
  .section:last-child { margin-bottom: 0; }
  .section-label {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: rgba(255, 255, 255, 0.5);
    font-weight: 500;
    margin-bottom: 14px;
  }

  /* ============ SOCIAL BUTTONS ROW ============ */
  .social-buttons {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }

  /* ============ INDIVIDUAL ICON BUTTON ============ */
  .social-btn {
    position: relative;
    width: 56px;
    height: 56px;
    border-radius: 18px;
    background: #0d0d0d;
    border: 1px solid rgba(255, 255, 255, 0.08);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    cursor: pointer;
    flex-shrink: 0;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
    transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    opacity: 0;
    transform: scale(0.5);
  }
  .modal-overlay.active .social-btn {
    opacity: 1;
    transform: scale(1);
  }
  .modal-overlay.active .social-btn:nth-child(1) { transition-delay: 0.05s; }
  .modal-overlay.active .social-btn:nth-child(2) { transition-delay: 0.10s; }
  .modal-overlay.active .social-btn:nth-child(3) { transition-delay: 0.15s; }
  .modal-overlay.active .social-btn:nth-child(4) { transition-delay: 0.20s; }

  .social-btn:hover {
    background: #1a1a1a;
    transform: translateY(-3px) scale(1.08);
    border-color: rgba(255, 255, 255, 0.18);
  }
  .social-btn:active {
    transform: translateY(-3px) scale(0.95);
  }
  .social-btn[data-platform="GitHub"]:hover {
    border-color: rgba(255, 255, 255, 0.45);
    box-shadow:
      0 4px 18px rgba(0, 0, 0, 0.5),
      0 0 22px rgba(255, 255, 255, 0.28);
  }
  .social-btn[data-platform="Fiverr"]::before {
    content: "";
    position: absolute;
    inset: 8px;
    border-radius: 50%;
    background: #1dbf73;
    opacity: 0;
    transform: scale(0.5);
    transition: opacity 0.3s ease, transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 0;
  }
  .social-btn[data-platform="Fiverr"]:hover::before {
    opacity: 1;
    transform: scale(1);
  }
  .social-btn[data-platform="Fiverr"] svg {
    position: relative;
    z-index: 1;
  }
  .social-btn[data-platform="Fiverr"]:hover {
    border-color: rgba(29, 191, 115, 0.5);
    box-shadow:
      0 4px 18px rgba(0, 0, 0, 0.5),
      0 0 22px rgba(29, 191, 115, 0.45);
  }
  .social-btn[data-platform="LinkedIn"]:hover {
    border-color: rgba(0, 119, 181, 0.55);
    box-shadow:
      0 4px 18px rgba(0, 0, 0, 0.5),
      0 0 22px rgba(0, 119, 181, 0.45);
  }
  .social-btn[data-platform="Behance"]:hover {
    border-color: rgba(23, 105, 255, 0.55);
    box-shadow:
      0 4px 18px rgba(0, 0, 0, 0.5),
      0 0 22px rgba(23, 105, 255, 0.45);
  }
  .social-btn:focus-visible {
    outline: 2px solid #00f5ff;
    outline-offset: 3px;
  }
  .social-btn svg {
    width: 26px;
    height: 26px;
    display: block;
    pointer-events: none;
    text-rendering: geometricPrecision;
    shape-rendering: geometricPrecision;
  }

  /* ============ COPY LINK BUTTON ============ */
  .copy-link-btn {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: #fff;
    font-family: inherit;
    font-size: 0.95rem;
    font-weight: 500;
    padding: 12px 18px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .copy-link-btn:hover {
    background: rgba(255, 255, 255, 0.1);
    border-color: rgba(255, 255, 255, 0.25);
  }
  .copy-link-btn:focus-visible {
    outline: 2px solid #00f5ff;
    outline-offset: 2px;
  }
  .copy-link-btn.copied {
    background: rgba(0, 245, 255, 0.12);
    border-color: #00f5ff;
    color: #00f5ff;
    box-shadow: 0 0 16px rgba(0, 245, 255, 0.3);
  }
  .copy-link-btn svg {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
  }
  .copy-link-btn .copy-text {
    transition: opacity 0.2s ease;
  }

  /* ============ RESPONSIVE ============ */
  @media (max-width: 480px) {
    .modal-card { padding: 30px 22px 24px; border-radius: 14px; }
    .modal-title { font-size: 1.35rem; margin-bottom: 24px; }
    .connect-trigger { padding: 12px 20px; font-size: 0.88rem; bottom: 20px; right: 20px; }
    .social-buttons { gap: 10px; }
  }
</style>
</head>
<body>

  <main class="demo-content">
    <h1>Social Links Modal</h1>
    <p>Click the floating <strong>Connect</strong> button at the bottom-right to open the modal. Press <strong>Esc</strong> or click outside to close.</p>
  </main>

  <!-- ============ FLOATING TRIGGER ============ -->
  <button class="connect-trigger" id="connectTrigger" type="button" aria-label="Open connect modal" aria-haspopup="dialog" aria-expanded="false">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
      <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
    </svg>
    <span>Connect</span>
  </button>

  <!-- ============ MODAL ============ -->
  <div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle" aria-hidden="true">
    <div class="modal-card" role="document">

      <button class="modal-close" id="modalClose" type="button" aria-label="Close modal">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" aria-hidden="true">
          <line x1="6" y1="6" x2="18" y2="18"/>
          <line x1="18" y1="6" x2="6" y2="18"/>
        </svg>
      </button>

      <h2 class="modal-title" id="modalTitle">Let&rsquo;s Connect</h2>

      <!-- Section 1: Social platforms -->
      <div class="section">
        <div class="section-label">Find me on</div>
        <div class="social-buttons">

          <!-- GitHub -->
          <a href="https://github.com/muhammadkhuzaima25" target="_blank" rel="noopener noreferrer" class="social-btn" data-platform="GitHub" aria-label="GitHub (opens in new tab)">
            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M12 .3a12 12 0 0 0-3.8 23.4c.6.1.8-.3.8-.6v-2c-3.3.7-4-1.6-4-1.6-.5-1.4-1.3-1.8-1.3-1.8-1.1-.7.1-.7.1-.7 1.2.1 1.8 1.2 1.8 1.2 1 1.8 2.8 1.3 3.5 1 .1-.8.4-1.3.8-1.6-2.7-.3-5.5-1.3-5.5-6 0-1.3.5-2.4 1.2-3.2-.1-.3-.5-1.6.1-3.3 0 0 1-.3 3.3 1.2a11.5 11.5 0 0 1 6 0c2.3-1.5 3.3-1.2 3.3-1.2.7 1.7.3 3 .1 3.3.8.8 1.2 1.9 1.2 3.2 0 4.7-2.9 5.7-5.6 6 .4.4.8 1.1.8 2.2v3.3c0 .3.2.7.8.6A12 12 0 0 0 12 .3"/>
            </svg>
          </a>

          <!-- Fiverr -->
          <a href="https://www.fiverr.com/muhmd_khuzaima" target="_blank" rel="noopener noreferrer" class="social-btn" data-platform="Fiverr" aria-label="Fiverr (opens in new tab)">
            <svg viewBox="0 0 32 32" aria-hidden="true">
              <text x="16" y="16" text-anchor="middle" dominant-baseline="central" font-family="'Arial Black', 'Helvetica Neue', Impact, sans-serif" font-weight="800" font-size="20" letter-spacing="-1.4" fill="#ffffff">fi</text>
            </svg>
          </a>

          <!-- LinkedIn -->
          <a href="https://www.linkedin.com/in/muhammad-khuzaima-991a08313" target="_blank" rel="noopener noreferrer" class="social-btn" data-platform="LinkedIn" aria-label="LinkedIn (opens in new tab)">
            <svg viewBox="0 0 32 32" aria-hidden="true">
              <text x="16" y="16" text-anchor="middle" dominant-baseline="central" font-family="'Arial Black', 'Helvetica Neue', Impact, sans-serif" font-weight="900" font-size="21" letter-spacing="-1.6" fill="currentColor">in</text>
            </svg>
          </a>

          <!-- Behance -->
          <a href="https://www.behance.net/muhammakhuzaima" target="_blank" rel="noopener noreferrer" class="social-btn" data-platform="Behance" aria-label="Behance (opens in new tab)">
            <svg viewBox="0 0 24 24" fill="white" width="26" height="26">
              <path d="M22 7h-7V5h7v2zm1.726 10c-.442 1.297-2.029 3-5.101 3-3.074 0-5.564-1.729-5.564-5.675 0-3.91 2.325-5.92 5.466-5.92 3.082 0 4.964 1.782 5.375 4.426.078.506.109 1.188.095 2.14H15.97c.13 3.211 3.483 3.312 4.588 2.029h3.168zm-7.686-4h4.965c-.105-1.547-1.136-2.219-2.477-2.219-1.466 0-2.277.768-2.488 2.219zm-9.574 6.988H0V5.021h6.953c5.476.081 5.58 5.444 2.72 6.906 3.461 1.26 3.577 8.061-3.207 8.061zM3 11h3.584c2.508 0 2.906-3-.312-3H3v3zm3.391 3H3v3.016h3.341c3.055 0 2.868-3.016.05-3.016z"/>
            </svg>
          </a>

        </div>
      </div>

      <!-- Section 2: Copy page URL -->
      <div class="section">
        <div class="section-label">Page direct</div>
        <button class="copy-link-btn" id="copyLinkBtn" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
          </svg>
          <span class="copy-text">Copy Link</span>
        </button>
      </div>

    </div>
  </div>

<script>
(function () {
  'use strict';

  const trigger  = document.getElementById('connectTrigger');
  const overlay  = document.getElementById('modalOverlay');
  const closeBtn = document.getElementById('modalClose');
  const copyBtn  = document.getElementById('copyLinkBtn');
  const copyText = copyBtn.querySelector('.copy-text');

  let copiedTimer = null;
  let lastFocus = null;

  function openModal() {
    lastFocus = document.activeElement;
    overlay.classList.add('active');
    overlay.setAttribute('aria-hidden', 'false');
    trigger.setAttribute('aria-expanded', 'true');
    document.body.style.overflow = 'hidden';
    // Move focus to close button for accessibility
    setTimeout(() => closeBtn.focus(), 50);
  }

  function closeModal() {
    overlay.classList.remove('active');
    overlay.setAttribute('aria-hidden', 'true');
    trigger.setAttribute('aria-expanded', 'false');
    document.body.style.overflow = '';
    if (lastFocus && typeof lastFocus.focus === 'function') {
      lastFocus.focus();
    }
  }

  // Open
  trigger.addEventListener('click', openModal);

  // Close (X)
  closeBtn.addEventListener('click', closeModal);

  // Close (click outside card)
  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) closeModal();
  });

  // Close (Esc)
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && overlay.classList.contains('active')) {
      closeModal();
    }
  });

  // Copy link to clipboard
  copyBtn.addEventListener('click', async () => {
    const url = window.location.href;
    const original = 'Copy Link';
    let success = false;

    try {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(url);
        success = true;
      } else {
        // Fallback for non-secure contexts (file://, http://)
        const ta = document.createElement('textarea');
        ta.value = url;
        ta.setAttribute('readonly', '');
        ta.style.position = 'fixed';
        ta.style.top = '0';
        ta.style.left = '0';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        success = document.execCommand('copy');
        document.body.removeChild(ta);
      }
    } catch (err) {
      success = false;
    }

    copyBtn.classList.add('copied');
    copyText.textContent = success ? 'Copied! \u2713' : 'Press Ctrl+C';

    clearTimeout(copiedTimer);
    copiedTimer = setTimeout(() => {
      copyBtn.classList.remove('copied');
      copyText.textContent = original;
    }, 2000);
  });
})();
</script>

</body>
</html>
